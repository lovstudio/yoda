<svg width="380" height="70" viewBox="0 0 380 70" xmlns="http://www.w3.org/2000/svg" fill="black">
  <!-- ============ Monogram: Yoda head silhouette + lightsaber ============ -->

  <!-- Lightsaber BEHIND the head, diagonal across whole monogram -->
  <g>
    <!-- Hilt (bottom-left), then blade extending up-right behind head -->
    <rect x="-2" y="56" width="14" height="5" rx="0.8" transform="rotate(-45 5 58.5)"/>
    <rect x="3" y="51" width="2.5" height="2.5" transform="rotate(-45 5 58.5)"/>
    <!-- Blade -->
    <rect x="12" y="56.2" width="58" height="2.6" transform="rotate(-45 5 58.5)"/>
  </g>

  <!-- Head silhouette: dome with chin, ears growing from upper sides -->
  <!-- Skull + chin: rounded dome top, narrowing to a soft chin -->
  <path d="
    M 16 28
    Q 16 12 32 12
    Q 48 12 48 28
    L 48 38
    Q 48 50 32 56
    Q 16 50 16 38
    Z
  "/>

  <!-- Left ear: emerges from upper-left of skull, sweeps up-and-out, pointed tip -->
  <path d="
    M 19 18
    L 4 2
    L 11 24
    Z
  "/>

  <!-- Right ear: mirror -->
  <path d="
    M 45 18
    L 60 2
    L 53 24
    Z
  "/>

  <!-- Two small eye dots, white (negative space) -->
  <circle cx="26" cy="32" r="1.8" fill="white"/>
  <circle cx="38" cy="32" r="1.8" fill="white"/>

  <!-- ============ Wordmark "YODA" ============ -->
  <g transform="translate(80 0)">
    <!-- Y -->
    <path d="M0 4 L12 4 L23 28 L34 4 L46 4 L29 38 L29 60 L17 60 L17 38 Z"/>
    <!-- O -->
    <path d="M62 4 L92 4 L100 12 L100 52 L92 60 L62 60 L54 52 L54 12 Z
             M64 18 L64 46 L66 48 L88 48 L90 46 L90 18 L88 16 L66 16 L64 18 Z"
          fill-rule="evenodd"/>
    <!-- D -->
    <path d="M108 4 L138 4 L154 20 L154 44 L138 60 L108 60 Z
             M120 16 L120 48 L134 48 L142 40 L142 24 L134 16 Z"
          fill-rule="evenodd"/>
    <!-- A -->
    <path d="M178 60 L166 60 L185 4 L201 4 L220 60 L208 60 L204 47 L182 47 Z
             M186 35 L200 35 L193 14 Z"
          fill-rule="evenodd"/>
  </g>
</svg>
