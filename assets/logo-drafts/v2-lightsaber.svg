    <!-- Hilt (pommel + grip + emitter) -->
    <rect x="232" y="32" width="22" height="8" rx="1.2"/>
    <!-- Activation stud -->
    <rect x="240" y="28" width="3" height="3"/>
    <!-- Emitter ring (slight bulge before blade) -->
    <rect x="253" y="31" width="3" height="10"/>
    <!-- Blade -->
    <path d="M256 33 L312 33 L316 36 L312 39 L256 39 Z"/>
  </g>
