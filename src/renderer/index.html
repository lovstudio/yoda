<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yoda</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('yoda-theme');
          var pref = raw ? JSON.parse(raw) : null;
          if (pref === 'emlight' || pref === 'ywarm') pref = 'ylight';
          else if (pref === 'emdark') pref = 'ydark';
          var effective =
            pref === 'ylight' || pref === 'ydark'
              ? pref
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'ydark'
                : 'ylight';
          document.documentElement.classList.add(effective);
        } catch (_) {}
      })();
    </script>
    <style>
      @keyframes yoda-splash-blink {
        50% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Static splash: covers the gap between window.show() and the renderer
           bundle finishing. Inline styles only (app CSS hasn't loaded yet);
           React's first commit replaces it with the animated boot screen, which
           uses the same hardcoded #111111 / mint palette. -->
      <div
        style="
          position: fixed;
          inset: 0;
          background: #111111;
          display: flex;
          align-items: center;
          justify-content: center;
        "
      >
        <div
          style="
            width: 14px;
            height: 34px;
            background: #7fe0a7;
            animation: yoda-splash-blink 1.1s steps(1) infinite;
          "
        ></div>
      </div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
