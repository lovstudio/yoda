<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yoda</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('yoda-theme');
          var pref = raw ? JSON.parse(raw) : null;
          if (pref === 'emlight' || pref === 'ywarm') pref = 'ylight';
          else if (pref === 'emdark') pref = 'ydark';
          var effective =
            pref === 'ylight' || pref === 'ydark'
              ? pref
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'ydark'
                : 'ylight';
          document.documentElement.classList.add(effective);
        } catch (_) {}
      })();
    </script>
    <style>
      @keyframes yoda-splash-pulse {
        0%,
        100% {
          opacity: 0.55;
        }
        50% {
          opacity: 1;
        }
      }
      /* Apple-boot style: the bar creeps to ~80% while the renderer bundle
         loads; the React boot screen's bar takes over and completes it. */
      @keyframes yoda-splash-progress {
        from {
          width: 0;
        }
        to {
          width: 80%;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Static splash: covers the gap between window.show() and the renderer
           bundle finishing. Inline styles only (app CSS hasn't loaded yet);
           React's first commit replaces it with the animated boot screen.
           Apple-boot composition, dead-centered: the Hood mark (a copy of the
           one in boot-screen.tsx — same geometry, same hardcoded #111111 /
           ink / mint palette) with a small progress bar beneath it. -->
      <div
        style="
          position: fixed;
          inset: 0;
          background: #111111;
          display: flex;
          align-items: center;
          justify-content: center;
        "
      >
        <div style="display: flex; flex-direction: column; align-items: center">
          <svg viewBox="0 0 240 220" style="width: 72px">
            <defs>
              <radialGradient id="splashDotGlow" cx="0.5" cy="0.5" r="0.5">
                <stop offset="0" stop-color="#7fe0a7" stop-opacity="0.55" />
                <stop offset="1" stop-color="#7fe0a7" stop-opacity="0" />
              </radialGradient>
              <mask id="splashCowl">
                <rect x="-60" y="-60" width="360" height="380" fill="#fff" />
                <path fill="#000" d="M 167.2 120.4 A 50 50 0 1 0 72.8 120.4 L 120 256 Z" />
              </mask>
            </defs>
            <path
              mask="url(#splashCowl)"
              fill="#e9e9e6"
              d="M 156.4 21.3 L 228.2 162.9 A 34 34 0 0 1 200 216 L 40 216 A 34 34 0 0 1 11.8 162.9 L 83.6 21.3 A 44 44 0 0 1 156.4 21.3 Z"
            />
            <circle
              cx="120"
              cy="104"
              r="36"
              fill="url(#splashDotGlow)"
              style="animation: yoda-splash-pulse 3.6s ease-in-out infinite"
            />
            <circle cx="120" cy="104" r="13" fill="#7fe0a7" />
          </svg>
          <!-- Apple-boot progress bar: indeterminate fill while the bundle
               loads. Same width/track/fill as the boot screen's bar. -->
          <div
            style="
              margin-top: 36px;
              width: 224px;
              height: 3px;
              border-radius: 2px;
              background: rgba(233, 233, 230, 0.14);
              overflow: hidden;
            "
          >
            <div
              style="
                height: 100%;
                border-radius: 2px;
                background: linear-gradient(to right, rgba(127, 224, 167, 0.45), #7fe0a7);
                box-shadow: 0 0 8px rgba(127, 224, 167, 0.45);
                animation: yoda-splash-progress 6s cubic-bezier(0.3, 0.1, 0.3, 1) forwards;
              "
            ></div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
